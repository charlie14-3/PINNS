<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hemodynamics Dashboard</title>
    <style>
        /* Importing a clean, modern font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b101e; /* Deep medical dark blue/black */
            color: #e2e8f0;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 950px;
            margin: auto;
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.05);
            border: 1px solid #1f2937;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #9ca3af;
            font-weight: 300;
            margin-bottom: 20px;
        }
        .status-container {
            text-align: center;
            margin-bottom: 40px;
            font-size: 0.9em;
            color: #10b981;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* The pulsing green dot */
        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .metrics-grid {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: linear-gradient(145deg, #1f2937, #111827);
            padding: 25px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            border: 1px solid #374151;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        /* Hover effects for the cards */
        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.15);
            border-color: #00f2fe;
        }
        .metric-card h3 {
            margin: 0 0 10px 0;
            color: #9ca3af;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .metric-value {
            font-size: 3.5em;
            font-weight: 700;
            /* Neon Gradient Text */
            background: -webkit-linear-gradient(#00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .visual-container {
            text-align: center;
            background: #1f2937;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #374151;
        }
        .visual-container h3 {
            margin-top: 0;
            color: #e2e8f0;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .visual-container img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Dropshadow behind image */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Hemodynamics Diagnostic Tool</h1>
        <p class="subtitle">Physics-Informed Neural Network Analysis</p>
        
        <div class="status-container">
            <span class="pulse"></span> System Online: Live Inference Data
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Max Pressure Drop</h3>
                <div class="metric-value" id="pressure-display">--</div>
            </div>
            <div class="metric-card">
                <h3>Peak Velocity</h3>
                <div class="metric-value" id="velocity-display">--</div>
            </div>
        </div>

        <div class="visual-container">
            <h3>Flow Analysis Heatmaps</h3>
            <img src="heatmap.png" alt="CFD Heatmap">
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('pressure-display').innerText = data.pressure_drop;
                document.getElementById('velocity-display').innerText = data.peak_velocity;
            })
            .catch(error => {
                console.error('Error loading the metrics:', error);
                document.getElementById('pressure-display').innerText = "ERR";
                document.getElementById('velocity-display').innerText = "ERR";
            });
    </script>

</body>
</html>
